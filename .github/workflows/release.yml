name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: darwin,  goarch: amd64, ext: ""     }
          - { goos: darwin,  goarch: arm64, ext: ""     }
          - { goos: linux,   goarch: amd64, ext: ""     }
          - { goos: linux,   goarch: arm64, ext: ""     }
          - { goos: windows, goarch: amd64, ext: ".exe" }
          - { goos: windows, goarch: arm64, ext: ".exe" }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true

      - name: build
        env:
          CGO_ENABLED: "0"
          GOOS:   ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          out="dist/wadb-${GITHUB_REF_NAME}-${GOOS}-${GOARCH}${{ matrix.ext }}"
          go build -trimpath -ldflags="-s -w" -o "$out" ./cmd/wadb
          ls -lh "$out"

      - uses: actions/upload-artifact@v4
        with:
          name: wadb-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          retention-days: 1
          if-no-files-found: error

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: checksums
        working-directory: dist
        run: |
          ls -lh
          sha256sum wadb-${GITHUB_REF_NAME}-* > SHA256SUMS
          cat SHA256SUMS

      - name: publish
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "wadb ${GITHUB_REF_NAME}" \
            --generate-notes \
            dist/wadb-${GITHUB_REF_NAME}-* \
            dist/SHA256SUMS
